<!-- templates/recipes/recipe_confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Supprimer {{ recipe.title }} - Livre de Recettes{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h2 class="h5 mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmation de suppression</h2>
            </div>
            <div class="card-body">
                <p class="lead">Êtes-vous sûr de vouloir supprimer la recette <strong>"{{ recipe.title }}"</strong> ?</p>
                <p class="text-danger"><i class="bi bi-exclamation-circle"></i> Cette action est irréversible.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'recipes:recipe_detail' recipe.slug %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Annuler
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Confirmer la suppression
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
